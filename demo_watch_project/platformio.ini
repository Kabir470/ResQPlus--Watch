; VS Code-friendly build via PlatformIO (recommended for Arduino-style .ino projects)
;
; NOTE: You may need to adjust the `board` to match your exact Waveshare ESP32-S3 board.
; Common options: esp32-s3-devkitc-1, esp32-s3-devkitm-1
;
[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Build the Arduino sketch + SquareLine-generated UI sources from the repo root.
; This repo also contains an ESP-IDF `main/` folder which must be excluded.
src_dir = .
build_src_filter =
	+<sketch_jan31e.ino>
	+<ui*.c>
	+<ui_Screen*.c>
	+<ui_SettingsScreen*.c>
	+<ui_helpers.c>
	+<ui_comp_hook.c>
	+<ui_img_*.c>
	+<ui_font_*.c>
	-<build/>
	-<main/>
	-<src/>

; The sketch uses a full-screen LVGL buffer in PSRAM.
board_build.psram = enabled

; Use project-provided LVGL configuration at `include/lv_conf.h`.
build_flags =
	-DLV_CONF_INCLUDE_SIMPLE

lib_deps =
	lvgl/lvgl@^9.4.0
	moononournation/GFX Library for Arduino@^1.6.4
	lewisxhe/XPowersLib@^0.3.3
	lewisxhe/SensorLib@^0.3.4
	https://github.com/lewisxhe/Arduino_DriveBus.git

; If you want LVGL / Arduino_GFX / XPowers etc via PlatformIO registry,
; add them here as `lib_deps` once you confirm the exact library names/versions.
; lib_deps =
;   lvgl/lvgl
;   moononournation/GFX Library for Arduino
;   lewisxhe/XPowersLib
